<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Last Door - Prototype</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main id="game">
    <div id="topbar">
      <div id="sceneCount"></div>
      <div id="timer">10</div>
    </div>

    <section id="storyBox">
      <h1 id="title">The Last Door</h1>
      <p id="text"></p>
      <div id="choices"></div>
    </section>

    <div id="audioHint">Use headphones. Make choices before the timer ends.</div>
    <button id="restart" class="hidden">Restart</button>
  </main>

  <script src="script.js"></script>
</body>
</html>
